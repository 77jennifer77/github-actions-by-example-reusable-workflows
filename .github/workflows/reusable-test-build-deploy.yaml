name: test-build-deploy with reusable workflow

on:
    workflow_call:
        inputs:
            docker-compose-command:
                required: false
                type: string
                description: "Docker compose command"
                default: |
                    docker compose up -d
            docker-compose-command-opts:
                required: false
                type: string
                description: "Docker compose command options"
                default: "-inMemory"
            test-script:
                required: false
                type: string
                description: "Test script"
                default: |
                    ./scripts/dynamodb/create-table.sh
                    go test -v ./...
            aws-region:
                required: false
                type: string
                description: "AWS region"
                default: "us-west-2"
            dynamodb-local-endpoint:
                required: false
                type: string
                description: "DynamoDB local endpoint"
                default: "http://localhost:8000"
            test-aws-access-key-id:
                required: false
                type: string
                description: "AWS access key ID (for local testing, should not be a real access key ID)"
                default: "test"
            test-aws-secret-access-key:
                required: false
                type: string
                description: "AWS secret access key (for local testing, should not be a real secret access key)"
                default: "test"
            image-owner:
                required: false
                type: string
                description: "The repository owner (the ORG or username)"
                default: ${{ github.event.repository.owner.login }}
            image-name:
                required: false
                type: string
                description: "The image name"
                default: ${{ github.event.repository.name }}
            build-tags:
                required: false
                type: string
                description: "The build tags"
                default: |
                    type=sha,prefix=,format=long
                    type=ref,event=branch
                    type=ref,event=pr
            build-push:
                required: false
                type: boolean
                description: "Whether to push the image after build"
                default: ${{ github.event_name != 'pull_request' }}
            deploy-commit:
                required: false
                type: boolean
                description: "Commit changes to deploy"
                default: ${{ github.event_name != 'pull_request' }}
            deploy-create-pr:
                required: false
                type: boolean
                description: "Create PR for deploy"
                default: ${{ github.event_name != 'pull_request' }}
jobs:
    test-build-deploy:
        uses: 77jennifer77/github-actions-by-example-reusable-workflows/.github/workflows/reusable-test-build-deploy.yaml@test-build-deploy-v0
        with:
            image-name: user-mgmt
